name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Use the committed static/tailwind.css instead of downloading the
  # Tailwind binary and recompiling at build time. Deterministic and
  # network-free on ephemeral hosted runners (crates/engram-web/build.rs).
  TAILWIND_SKIP: "1"

permissions:
  contents: read

# Platform-agnostic gates (fmt, clippy, deny, audit, gitleaks, the
# separate companion workspace) run on Linux — cheapest and fastest.
# Only the jobs that must exercise real OS behaviour run on macOS /
# Windows: the macOS test + release binary and the Windows regression
# tests. GitHub-hosted runners give public repos free standard minutes,
# so no self-hosted infrastructure is required.
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --all-targets

  # Native Windows is where the `#[cfg(windows)]` regression tests (drain
  # lock ERROR_LOCK_VIOLATION, libgit2 path-resolution fallback, verbatim
  # path handling) actually run — the macOS test job never compiles them.
  # Observability only for now (`continue-on-error`): a Windows
  # runner-environment quirk must not block merges, but the results are
  # visible on every push so Windows-only breakage is caught in review
  # instead of by end users.
  test-windows:
    name: test (Windows, non-gating)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --all-targets

  # The companion importer is deliberately outside the root workspace
  # (its own [workspace] in companions/engram-importer/Cargo.toml), so
  # none of the jobs above compile it. Gate it here with the same
  # fmt/clippy/test trio docs/companion-crates.md prescribes, or a
  # toolchain bump / convention change rots it silently.
  companions:
    name: companions (engram-importer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: companions/engram-importer
      - run: cargo fmt --check --manifest-path companions/engram-importer/Cargo.toml
      - run: cargo clippy --manifest-path companions/engram-importer/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path companions/engram-importer/Cargo.toml

  # Build the release binary on its own so a release-only failure
  # (LTO crash, codegen issue, dead-code-with-debug-assertions) is caught
  # in CI rather than only when a tag is pushed. Mirrors the release
  # asset: the single Apple Silicon binary. No Intel macOS and no Linux —
  # neither is a release target.
  release-build:
    name: cargo build --release (macos-aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --release --bin engram
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-engram-macos-aarch64
          path: target/release/engram
          retention-days: 1

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # `cargo deny check` reads deny.toml and checks
      # advisories/licenses/bans/sources over the whole dependency graph.
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - run: cargo install cargo-audit --locked
      - run: >
          cargo audit
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0320
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          # Full history so the scan covers every commit reachable
          # from the pushed ref, not just the last one.
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Gitleaks
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan full history
        run: >
          "$RUNNER_TEMP/gitleaks" git .
          --config .gitleaks.toml
          --redact
          --no-banner
          --exit-code 1
