<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}engram{% endblock %}</title>
  <link rel="icon" href="static/logo.png" type="image/png">
  <link rel="stylesheet" href="static/tailwind.css">
</head>
<body class="min-h-full bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center gap-4 h-14">
      <a href="." class="flex items-center gap-2 shrink-0">
        <img src="static/logo.png" alt="engram logo" class="h-7 w-auto">
        <span class="font-semibold text-slate-800 dark:text-slate-100 text-sm hidden sm:inline">engram</span>
      </a>
      <div class="flex-1"></div>
      <form action="search" method="get" class="flex items-center">
        <input
          name="q"
          type="search"
          placeholder="Search…"
          class="w-40 sm:w-64 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1.5 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </form>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800 mt-16 py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-xs text-slate-400 dark:text-slate-600">
      engram · read-only
    </div>
  </footer>
</body>
</html>
