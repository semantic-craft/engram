# engram configuration.
#
# All values can also be overridden via environment variables prefixed
# `ENGRAM_` (e.g. `ENGRAM_BIND=0.0.0.0:49374`).
#
# `data_dir` is intentionally absent here: it's set by `--data-dir`
# or `ENGRAM_DATA_DIR`, and the config file lives inside it.

# HTTP bind address used by `engram serve`.
bind = "127.0.0.1:49374"

# Host-header allowlist for the HTTP server (DNS-rebinding defence).
# Keep loopback defaults for local-only use. When binding to a LAN
# address, include the host/IP clients will use, e.g.
# `ENGRAM_ALLOWED_HOSTS=homelab,192.0.2.10,localhost,127.0.0.1`.
allowed_hosts = ["localhost", "127.0.0.1", "::1"]

# Default tracing filter (overridable by RUST_LOG).
log_level = "info"

# M8 retention-sweep parameters.
#
# Formula:
#   retention = salience * exp(-lambda * age_days)
#             + sigma * log(1 + access_count) * exp(-mu * days_since_access)
#
# With the defaults below, an unused episodic page drops below
# `cold_threshold = 0.20` at ~80 days; recent accesses bump it back up.
# Semantic / pinned pages are exempt from decay entirely. Tune to taste:
#
#   - Slow decay (forget less aggressively): lambda = 0.01 (~140d floor)
#   - Faster decay (clean up more aggressively): lambda = 0.04 (~40d floor)
#   - Bigger access boost (frequently-used stuff lasts longer): sigma = 1.0
#   - Bigger time-pressure on access: mu = 0.08
[decay]
lambda = 0.02
sigma = 0.6
mu = 0.04
salience_default = 1.0
cold_threshold = 0.20
hard_delete_after_days = 180

# Privacy strip.
#
# Built-in patterns ALWAYS run; they cover bearer tokens, vendor-prefixed
# API keys (sk-, sk_live_, ghp_, github_pat_, AKIA, AIza, xoxb/xoxp/xoxa/
# xapp, Slack-shaped tokens), JWTs, PEM-bracketed private keys,
# URL-embedded credentials (postgres://user:pass@host), the named env
# vars for every supported provider, the generic `*_(KEY|TOKEN|SECRET|
# PASSWORD|CREDENTIAL)=…` shape, and filesystem paths under ~/.ssh,
# ~/.aws, ~/.kube, ~/.config/gcloud, ~/.gnupg.
#
# Two optional fields tune the strip:
#
#   extra_patterns — additional regex patterns to redact. Compiled once
#                    at startup; an invalid regex aborts startup with a
#                    clear error.
#   allowlist      — substrings that should never be redacted, even if a
#                    pattern matches them. Useful when a project codename
#                    or stable identifier collides with the generic
#                    env-var catch-all.
#
# Examples (uncomment to use):
#
#   extra_patterns = [
#     # Internal project token format: PROJ-<32 hex chars>.
#     "PROJ-[0-9a-f]{32}",
#   ]
#   allowlist = [
#     # We don't want this public identifier redacted by the generic
#     # *_KEY catch-all even though it ends in "_KEY".
#     "PUBLIC_VERIFY_KEY",
#   ]
[sanitize]
extra_patterns = []
allowlist = []

# Auto-improvement reviewer.
#
# The background scheduler reviews newly-completed sessions in every project
# when an LLM provider is configured. Ticks are non-overlapping: long all-project
# review passes delay the next tick instead of starting another copy. Approval is
# a separate stage: by default proposals are staged for audit and immediately
# approved through the normal wiki write path. Set `require_approval = true` to
# keep scheduler and manual-run proposals pending until an admin runs
# `engram pending-writes approve <id>`.
#
# Older configs may still contain an `[auto_improve] mode = ...` line. That key
# is ignored by current engram and can be removed when convenient.
[auto_improve]
require_approval = false
min_observations = 8
min_session_duration_secs = 120
min_confidence = 0.75
max_input_tokens = 24000
max_proposals_per_run = 5
include_raw_fallback = false
proposal_actor = "auto_improve"
pending_path = "_pending/auto-improve"

# Optional executable evaluation gate for selected proposal targets. Disabled by
# default; operators supply the command and scoring policy. The command is run
# directly (not through a shell), split on whitespace, with JSON on stdin. Use a
# wrapper script for paths with spaces, custom environment, or multiple commands.
# It must print JSON such as { "score_before": 0.72, "score_after": 0.76, "passed": true }.
[auto_improve.eval]
enabled = false
command = ""
timeout_secs = 120
targets = ["_rules", "procedures"]
min_delta = 0.0

[auto_improve.scheduler]
enabled = true
interval_secs = 3600
max_sessions_per_tick = 1 # per project
min_session_age_secs = 600
